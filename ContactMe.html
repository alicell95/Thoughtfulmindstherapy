  <script src="https://web3forms.com/client/script.js" async defer></script>
  <div class="Title">
    <h1>Contact Me</h1>
    <p>Bla Bla Bla text about what happens when you contact me</p>
  </div>

  <div class="container">
    <form
      action="https://api.web3forms.com/submit"
      method="post"
      id="contact_form"
    >
      <div class="name">
        <label for="name"></label>
        <input
          type="text"
          placeholder="My name is"
          name="name"
          id="name_input"
          required
        />
      </div>
      <div class="email">
        <label for="email"></label>
        <input
          type="email"
          placeholder="My e-mail is"
          name="email"
          id="email_input"
          required
        />
      </div>
      <div class="telephone">
        <label for="name"></label>
        <input
          type="text"
          placeholder="My number is"
          name="telephone"
          id="telephone_input"
          required
        />
      </div>
      <div class="message">
        <label for="message"></label>
        <textarea
          name="message"
          placeholder="Please tell me a little about you and what service your interested in and why."
          id="message_input"
          cols="30"
          rows="5"
          required
        ></textarea>
      </div>
      <div class="submit">
        <input type="submit" value="Send Message" id="form_button" />
      </div>
      <input
        type="hidden"
        name="access_key"
        value="cf1ce230-7405-4194-b495-45bf36213da5"
      />
      <input
        type="hidden"
        name="redirect"
        value="https://web3forms.com/success"
      />
    </form>
  </div>
</body>
